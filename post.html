<!-- Share banner-->
    <div class="sharebanner">
        <ol id="shares">
            <li id="shareleft"><img src="/img/Shape 14.svg" height="16px" width="16px">Share</li>
            <li id="shareright">Save<img src="/img/Shape 13.svg" height="16px" width="16px"></li>
        </ol>
    </div>

    <div class="footer">
    </div>


    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const fileName = urlParams.get('file');

        if (fileName) {
            fetch(fileName)
                .then(response => response.text())
                .then(markdownText => {
                    document.getElementById('post-content').innerHTML = marked.parse(markdownText);
                });
        }

        // Hämta elementen från din sharebanner
const shareBtn = document.getElementById('shareleft');
const saveBtn = document.getElementById('shareright');

// --- DELA ---
if (shareBtn) {
    shareBtn.addEventListener('click', () => {
        // Kontrollera om webbläsaren stödjer den inbyggda delningsmenyn
        if (navigator.share) {
            navigator.share({
                title: document.title,
                text: 'Kolla in det här inlägget!',
                url: window.location.href
            })
            .then(() => console.log('Delning lyckades!'))
            .catch((error) => console.log('Delning avbröts:', error));
        } else {
            // Fallback om webbläsaren inte stödjer navigator.share (t.ex. äldre datorer)
            navigator.clipboard.writeText(window.location.href);
            alert('Länken har kopierats till urklipp!');
        }
    });
}

// --- SPARA (BOKMÄRKE) ---
// Sparar/avsparar det aktuella inlägget i localStorage, under nyckeln "savedPosts".
// Listan visas sedan på hemsidans "Saved"-flik via buildTreeList() i script.js.
let currentPostMeta = null;

function renderSaveButtonState(isSaved) {
    if (!saveBtn) return;
    saveBtn.innerHTML = isSaved
        ? 'Saved<img src="/img/Shape 13.svg" height="16px" width="16px">'
        : 'Save<img src="/img/Shape 13.svg" height="16px" width="16px">';
}

if (fileName) {
    fetch('jsons/posts.json')
        .then(r => r.json())
        .then(posts => {
            currentPostMeta = posts.find(p => p.file === fileName) || null;
            if (!currentPostMeta) return;

            const saved = JSON.parse(localStorage.getItem('savedPosts') || '[]');
            const isSaved = saved.some(p => p.file === currentPostMeta.file);
            renderSaveButtonState(isSaved);
        });
}

if (saveBtn) {
    saveBtn.addEventListener('click', () => {
        if (!currentPostMeta) return; // Metadatan har inte hunnit laddas än

        let saved = JSON.parse(localStorage.getItem('savedPosts') || '[]');
        const isSaved = saved.some(p => p.file === currentPostMeta.file);

        if (isSaved) {
            saved = saved.filter(p => p.file !== currentPostMeta.file);
        } else {
            saved.push({
                title: currentPostMeta.title,
                date: currentPostMeta.date,
                file: currentPostMeta.file
            });
        }

        localStorage.setItem('savedPosts', JSON.stringify(saved));
        renderSaveButtonState(!isSaved);
    });
}
    </script>
