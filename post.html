<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Website</title>
</head>
<body>
<!-- HEADER LOGO -->
        <nav class="logo-header">
                <p class="logostretch">
                    <span>C</span>
                    <span>A</span>
                    <span>R</span>
                    <span>D</span>
                    <span>I</span>
                    <span>F</span>
                    <span>L</span>
                    <span>O</span>
                    <span>W</span>
                </p>
        </nav>
<!-- HEADER BUTTONS -->
        <nav class="schematic-header">
            <div class="nav-item" onclick="filterCategory('Home')">
                <img class="nav-icon home-icon"
                    src="/img/Shape 56.svg">      
                <span>Home</span>
            </div>
             <div class="nav-item" onclick="filterCategory('Blog')">
                <img class="nav-icon text-icon"
                    src="/img/Shape 57.svg">
                <span>"Krönikan"</span>
            </div>
            <div class="nav-item" onclick="filterCategory('Philosophy')">
                <img 
                    src="/img/Shape 25.svg"
                    height="16"
                    width="16">
                <span>Philosophy</span>
            </div>
            <div class="nav-item" onclick="filterCategory('Materiality')">
                <img 
                    src="/img/Shape 60.svg"
                    height="16"
                    width="16">
                <span>Materiality</span>
            </div>
            <div class="nav-item" onclick="filterCategory('Status')">
                <img 
                    src="/img/Shape 44.svg"
                    height="16"
                    width="16">
                <span>Status</span>
            </div>
</nav>

<!-- Text-delen -->

<main id="post-content" class="post-reader"></main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const fileName = urlParams.get('file');

        if (fileName) {
            fetch(fileName)
                .then(response => response.text())
                .then(markdownText => {
                    document.getElementById('post-content').innerHTML = marked.parse(markdownText);
                });
        }
    </script>
</body>
</html>
